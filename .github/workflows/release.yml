name: CreateRelease

on:
  push:
    tags:
      - 'v*'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  create_release:
    name: Create release
    runs-on: windows-2022
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: Create release
        id: create_release
        uses: comnoco/create-release-action@v2.0.5
        with:
          draft: false
          prerelease: false
          tag_name: ${{ github.ref }}
          release_name: ${{ github.ref_name }}

  build:
    needs: create_release
    runs-on: windows-2022
    strategy:
      matrix:
        config: [Release, Debug]
        platform: [Win32]
        include:
          - zip_name: HaloCE.zip
            bin_name: Release
            config: Release
            platform: Win32
          - zip_name: HaloCE_Debug.zip
            bin_name: Debug
            config: Debug
            platform: Win32

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: 'true'

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v3

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: |
        ./build ${{matrix.config}}
        XCOPY /E /I /Y .\assets\.trex .\build\bin\${{matrix.bin_name}}\.trex
        XCOPY /E /I /Y .\assets\rtx_comp .\build\bin\${{matrix.bin_name}}\rtx_comp
        del .\build\bin\${{matrix.bin_name}}\*.exp
        del .\build\bin\${{matrix.bin_name}}\*.ilk
        del .\build\bin\${{matrix.bin_name}}\*.lib

    - name: Create artifact
      run: 7z a -tzip ./build/bin/${{matrix.zip_name}} ./build/bin/${{matrix.bin_name}}/*

    - name: Upload artifact
      uses: actions/github-script@v4
      with:
        script: |
          const fs = require('fs');
          // Upload the release asset
          await github.repos.uploadReleaseAsset({
            owner: context.repo.owner,
            repo: context.repo.repo,
            release_id: ${{ needs.create_release.outputs.id }},
            name: "./build/bin/${{matrix.zip_name}}",
            data: await fs.readFileSync("./build/bin/${{matrix.zip_name}}")
          });
